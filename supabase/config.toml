
[functions.sync-to-sheets]
enabled = true
verify_jwt = true
import_map = "./functions/sync-to-sheets/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/sync-to-sheets/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/sync-to-sheets/*.html" ]

[functions.privacy-retention-sync]
enabled = true
verify_jwt = false
entrypoint = "./functions/privacy-retention-sync/index.ts"

[functions.change-pending-email]
enabled = true
verify_jwt = false
entrypoint = "./functions/change-pending-email/index.ts"
